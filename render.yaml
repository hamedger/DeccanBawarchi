services:
  - type: web
    name: deccanbawarchi-web
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff

  - type: web
    name: deccanbawarchi-api
    runtime: node
    rootDir: server
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLOVER_API_BASE_URL
        value: https://api.clover.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://deccanbawarchi.com,https://www.deccanbawarchi.com
      - key: CLOVER_SUCCESS_URL
        value: https://deccanbawarchi.com/checkout/success
      - key: CLOVER_FAILURE_URL
        value: https://deccanbawarchi.com/checkout
      - key: CLOVER_LOCATIONS_JSON
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: CLOVER_TIPS_ENABLED
        value: "false"
